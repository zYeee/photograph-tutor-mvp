services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "50000-50020:50000-50020/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - backend-venv:/app/.venv
      - db-data:/app/db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      livekit:
        condition: service_healthy

  agent:
    build: ./backend
    command: uv run python agent.py dev
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=ws://livekit:7880
      - BACKEND_URL=http://backend:8000
    depends_on:
      livekit:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  db-data:
  backend-venv:

networks:
  default:
    driver: bridge
